<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить операцию — Finance Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topbar">
        <div class="logo">Личные финансы</div>
        <a href="#" id="logoutBtn" class="logout">Выход</a>
    </header>

    <main class="main-content">
        <h1>Добавить новую операцию</h1>

        <form id="addForm" class="form-card">
            <label>Тип операции:</label>
            <select id="type">
                <option value="income">Доход</option>
                <option value="expense">Расход</option>
            </select>

            <label>Категория:</label>
            <select id="category"></select>

            <label>Сумма:</label>
            <input type="number" id="amount" required>

            <label>Дата:</label>
            <input type="date" id="date" required>

            <label>Описание:</label>
            <textarea id="desc" required></textarea>

            <button type="submit">Добавить</button>
        </form>

        <button class="next-btn" onclick="window.location.href='list.html'">➡ Следующая страница</button>
    </main>

    <script>
        const username = localStorage.getItem('username');
        if (!username) window.location.href = 'login.html';

        const categories = JSON.parse(localStorage.getItem('categories')) || ['Зарплата', 'Продукты', 'Транспорт'];
        const transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const categorySelect = document.getElementById('category');
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            categorySelect.appendChild(opt);
        });

        document.getElementById('addForm').addEventListener('submit', e => {
            e.preventDefault();

            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const desc = document.getElementById('desc').value;

            transactions.push({ type, category, amount, date, desc });
            localStorage.setItem('transactions', JSON.stringify(transactions));

            alert('Операция добавлена успешно!');
            e.target.reset();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('username');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
